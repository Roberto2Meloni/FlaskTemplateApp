<!-- Template_app_v001_page_01.html -->
<div class="todo-wrapper">
  <!-- Header -->
  <div class="todo-header">
    <div class="todo-header-left">
      <span class="todo-badge">AUFGABEN</span>
      <h2 class="todo-title">Meine ToDo's</h2>
    </div>
    <button class="btn-create" onclick="addTodo()">
      <i class="bi bi-plus-lg"></i>
      <span>Task erstellen</span>
    </button>
  </div>

  <!-- Stats Bar -->
  <div class="todo-stats">
    <div class="stat-item">
      <span class="stat-number" id="stat-total">0</span>
      <span class="stat-label">Gesamt</span>
    </div>
    <div class="stat-divider"></div>
    <div class="stat-item">
      <span class="stat-number accent" id="stat-open">0</span>
      <span class="stat-label">Offen</span>
    </div>
    <div class="stat-divider"></div>
    <div class="stat-item">
      <span class="stat-number success" id="stat-done">0</span>
      <span class="stat-label">Pipeline</span>
    </div>
  </div>

  <!-- Todo List -->
  <div class="todo-list" id="todo-list">
    {% for todo in todos %}
    <div class="todo-item" data-status="open">
      <button class="todo-check" title="Als erledigt markieren">
        <i class="bi bi-circle"></i>
      </button>
      <div class="todo-body">
        <span class="todo-text">{{ todo.text }}</span>
        <div class="todo-meta">
          <span class="todo-tag tag-high">{{todo.priority}}</span>
          <span class="todo-date"
            ><i class="bi bi-calendar3"></i>{{todo.date}}</span
          >
        </div>
      </div>
      <div class="todo-actions">
        <button class="action-btn" title="Bearbeiten">
          <i class="bi bi-pencil"></i>
        </button>
        <button class="action-btn danger" title="Löschen">
          <i class="bi bi-trash3"></i>
        </button>
      </div>
    </div>
  </div>
  {% endfor %}

  <!-- Empty State -->
  {% if todos|length == 0 %}
  <div class="todo-empty hidden" id="todo-empty">
    <i class="bi bi-inbox"></i>
    <p>Keine Tasks vorhanden</p>
    <small>Erstelle deinen ersten Task!</small>
  </div>
  {% endif %}
</div>
